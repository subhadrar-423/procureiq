//  {
//    stage:   "submission"|"mgr1"|"mgr2"|"procurement"|"edit",
//    action:  string,          // e.g. "Request Submitted"
//    by:      string,          // user's name
//    role:    string,          // user's role

//  }
//
//  Procurement doc also stores top-level fields:
//    procurementStatus, procurementPerson, procurementNote
// ─────────────────────────────────────────────────────────────

const DEPTS = ["Engineering","Finance","HR","Marketing","Operations","IT","Sales","Legal","Design","Procurement","Other"];
const CATS  = ["Productivity","Security","Analytics","Communication","DevOps","Finance","HR Tools","Design","Other"];
const ROLES = {

  procurement: {label:"Procurement Team",icon:"🏢", color:"#059669", bg:"#ECFDF5"},
  admin:       {label:"Admin",           icon:"🔑", color:"#DC2626", bg:"#FEF2F2"},
};
const PROC_MSGS = ["Purchased","Not Purchased","In Process","Vendor Pending"];
const STATUS = {
  "mgr1-pending":       {label:"Awaiting Manager 1",      c:"#D97706", bg:"#FFFBEB"},
  "mgr1-rejected":      {label:"Rejected by Manager 1",   c:"#DC2626", bg:"#FEF2F2"},
  "mgr2-pending":       {label:"Awaiting Manager 2",      c:"#7C3AED", bg:"#F5F3FF"},
  "mgr2-rejected":      {label:"Rejected by Manager 2",   c:"#DC2626", bg:"#FEF2F2"},
  "procurement-review": {label:"Awaiting Procurement",    c:"#0284C7", bg:"#F0F9FF"},
  "approved":           {label:"Approved",                c:"#059669", bg:"#ECFDF5"},
  "rejected":           {label:"Rejected",                c:"#991B1B", bg:"#FEF2F2"},
};

// Stage config drives the timeline card colors/icons
const STAGE_CFG = {
  submission:  {label:"Request Submission",   icon:"📝", color:"#6366F1", bg:"#EEF2FF",  border:"#C7D2FE"},
  mgr1:        {label:"Manager 1 Review",     icon:"👔", color:"#D97706", bg:"#FFFBEB",  border:"#FDE68A"},
  mgr2:        {label:"Manager 2 Review",     icon:"👔", color:"#7C3AED", bg:"#F5F3FF",  border:"#DDD6FE"},
  procurement: {label:"Procurement Update",   icon:"🏢", color:"#059669", bg:"#ECFDF5",  border:"#A7F3D0"},
  edit:        {label:"Request Edited",       icon:"✏️", color:"#0284C7", bg:"#F0F9FF",  border:"#BAE6FD"},
};

function toYearly(amt,p){ const n=parseFloat(amt)||0; return p==="monthly"?n*12:n; }
function fmtMoney(n){ return "$"+(parseFloat(n)||0).toLocaleString("en-IN"); }

function nowParts(){
  const now=new Date();
  return {
    at:   now.toISOString(),
    date: now.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
    time: now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true}),
  };
}
function fmtDate(v){
  if(!v) return "—";
  try{ const d=v?.toDate?v.toDate():new Date(v); return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); }
  catch{ return "—"; }
}
function fmtTime(v){
  if(!v) return "—";
  try{ const d=v?.toDate?v.toDate():new Date(v); return d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true}); }
  catch{ return "—"; }
}

// ── Build a structured log entry ──────────────────────────────
function mkLog(stage, action, user, note=""){
  const {at,date,time}=nowParts();
  return { stage, action, by:user.name, role:user.role, email:user.email||"", note, at, date, time };
}

// ─────────────────────────────────────────────────────────────
//  TIMELINE COMPONENT
// ─────────────────────────────────────────────────────────────
function Timeline({logs}){
  if(!logs||logs.length===0) return(
    <div style={{textAlign:"center",padding:"30px 0",color:"#A8B0C8"}}>
      <div style={{fontSize:28,marginBottom:8}}>📋</div>
      <div style={{fontSize:13}}>No actions recorded yet.</div>
    </div>
  );

  // Sort oldest → newest for display
  const sorted=[...logs].sort((a,b)=>new Date(a.at)-new Date(b.at));

  return(
    <div style={{position:"relative",paddingLeft:4}}>
      {sorted.map((log,i)=>{
        const cfg = STAGE_CFG[log.stage] || STAGE_CFG.submission;
        const rejected = log.action?.toLowerCase().includes("reject");
        const dotColor  = rejected ? "#DC2626" : cfg.color;
        const dotBg     = rejected ? "#FEF2F2" : cfg.bg;
        const dotBorder = rejected ? "#FECACA" : cfg.border;
        const isLast    = i === sorted.length-1;

        return(
          <div key={i} style={{display:"flex",gap:0,position:"relative"}}>
            {/* Spine */}
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:48,flexShrink:0}}>
              {/* dot */}
              <div style={{width:40,height:40,borderRadius:"50%",background:dotBg,border:`2.5px solid ${dotBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,boxShadow:`0 2px 8px ${dotColor}30`,zIndex:2}}>
                {rejected?"❌":cfg.icon}
              </div>
              {/* line below dot */}
              {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:"linear-gradient(to bottom,"+dotBorder+",#E2E6F0)",marginTop:2,marginBottom:2}}/>}
            </div>

            {/* Card */}
            <div style={{flex:1,marginBottom:isLast?0:16,marginLeft:10}}>
              <div style={{background:dotBg,border:`1.5px solid ${dotBorder}`,borderRadius:12,overflow:"hidden",boxShadow:"0 2px 6px rgba(0,0,0,.04)"}}>

                {/* Stage label bar */}
                <div style={{background:dotColor,padding:"5px 14px",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#fff",textTransform:"uppercase",letterSpacing:".07em"}}>{cfg.label}</span>
                </div>

                {/* Content */}
                <div style={{padding:"12px 14px"}}>
                  {/* Action title */}
                  <div style={{fontSize:15,fontWeight:700,color:"#1C1E2D",marginBottom:10}}>{log.action}</div>

                  {/* Info pills row */}
                  <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:log.note?10:0}}>
                    {/* Who */}
                    <div style={{display:"flex",alignItems:"center",gap:6,background:"#fff",padding:"5px 11px",borderRadius:20,border:`1px solid ${dotBorder}`}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:dotColor,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>
                        {(log.by||"?").charAt(0).toUpperCase()}
                      </div>
                      <div>
                        <div style={{fontSize:12,fontWeight:700,color:"#1C1E2D",lineHeight:1}}>{log.by}</div>
                        <div style={{fontSize:10,color:"#A8B0C8",textTransform:"capitalize"}}>{log.role}</div>
                      </div>
                    </div>
                    {/* Date */}
                    <div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",padding:"5px 11px",borderRadius:20,border:`1px solid ${dotBorder}`}}>
                      <span style={{fontSize:13}}>📅</span>
                      <div>
                        <div style={{fontSize:10,color:"#A8B0C8",lineHeight:1,marginBottom:1}}>Date</div>
                        <div style={{fontSize:12,fontWeight:700,color:"#1C1E2D"}}>{log.date}</div>
                      </div>
                    </div>
                    {/* Time */}
                    <div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",padding:"5px 11px",borderRadius:20,border:`1px solid ${dotBorder}`}}>
                      <span style={{fontSize:13}}>🕐</span>
                      <div>
                        <div style={{fontSize:10,color:"#A8B0C8",lineHeight:1,marginBottom:1}}>Time</div>
                        <div style={{fontSize:12,fontWeight:700,color:"#6366F1"}}>{log.time}</div>
                      </div>
                    </div>
                    {/* Email */}
                    {log.email&&<div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",padding:"5px 11px",borderRadius:20,border:`1px solid ${dotBorder}`}}>
                      <span style={{fontSize:12}}>✉</span>
                      <div style={{fontSize:11,color:"#7B84A0"}}>{log.email}</div>
                    </div>}
                  </div>

                  {/* Note */}
                  {log.note&&<div style={{marginTop:4,padding:"8px 11px",background:"#fff",borderRadius:8,border:`1px solid ${dotBorder}`,fontSize:12,color:"#4B5268",lineHeight:1.6}}>
                    <span style={{fontWeight:700,color:dotColor}}>Note: </span>{log.note}
                  </div>}
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  WORKFLOW STEPPER
// ─────────────────────────────────────────────────────────────
function Stepper({status}){
  const steps=[{l:"Submitted",i:"📝"},{l:"Manager 1",i:"👔"},{l:"Manager 2",i:"👔"},{l:"Procurement",i:"🏢"},{l:"Decision",i:"✅"}];
  const idx={"mgr1-pending":1,"mgr1-rejected":1,"mgr2-pending":2,"mgr2-rejected":2,"procurement-review":3,"approved":4,"rejected":4}[status]||0;
  const rej=status?.includes("rejected");
  return(
    <div style={{display:"flex",alignItems:"flex-start",padding:"18px 20px",background:"#fff",border:"1px solid #E2E6F0",borderRadius:12,marginBottom:18}}>
      {steps.map((s,i)=>{
        const done=i<idx,act=i===idx,bad=rej&&act;
        const c=bad?"#DC2626":done?"#059669":act?"#6366F1":"#C8D0E0";
        const bg=bad?"#FEF2F2":done?"#ECFDF5":act?"#EEF2FF":"#F7F8FC";
        return(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
            {i<steps.length-1&&<div style={{position:"absolute",top:15,left:"50%",width:"100%",height:2,background:done?"#059669":"#E2E6F0",zIndex:0}}/>}
            <div className="step-dot" style={{background:bg,borderColor:c,color:c}}>{bad?"✕":done?"✓":s.i}</div>
            <div style={{fontSize:10,fontWeight:600,color:c,marginTop:5,textAlign:"center",lineHeight:1.3}}>{s.l}</div>
          </div>
        );
      })}
    </div>
  );
}

function EmailModal({req,level,onClose}){

  const body=`Hi ${mgrName},

A procurement request requires your approval (Level ${level} of 2).

TOOL         : ${req.toolName}
VENDOR       : ${req.toolVendor||"—"}
DEPARTMENT   : ${req.department}
COST         : ${fmtMoney(req.costAmount)} / ${req.costPeriod}  (${fmtMoney(yearly)} / year)
SUBMITTED BY : ${req.submitterName||"—"}

━━━━━━━━━━━━━━━━━━━━━━━━
CLICK TO APPROVE OR REJECT:
${link}
━━━━━━━━━━━━━━━━━━━━━━━━

— ProcureIQ System`;
  const mailto=`mailto:${mgrEmail}?subject=Action Required: "${req.toolName}" needs your approval [Level ${level}] — ProcureIQ&body=${encodeURIComponent(body)}`;
  return(
    <div className="overlay" onClick={onClose}>

          <div><div style={{fontWeight:700,fontSize:14}}>📧 Approval Email — Manager {level}</div><div style={{fontSize:12,color:"#7B84A0",marginTop:2}}>{mgrName} · {mgrEmail}</div></div>
          <button className="btn" style={{background:"#F7F8FC",color:"#7B84A0",padding:"5px 9px"}} onClick={onClose}>✕</button>
        </div>
        <div style={{padding:20}}>
          <pre style={{background:"#F7F8FC",border:"1px solid #E2E6F0",borderRadius:8,padding:13,fontSize:11,color:"#4B5268",whiteSpace:"pre-wrap",lineHeight:1.7,marginBottom:13,fontFamily:"monospace"}}>{body}</pre>
          <div style={{background:"#EEF2FF",padding:"9px 13px",borderRadius:8,marginBottom:13,fontSize:12,color:"#6366F1",wordBreak:"break-all"}}>🔗 {link}</div>

              <button className="btn" style={{background:"#6366F1",color:"#fff",padding:"10px",width:"100%",justifyContent:"center"}}>📧 Open in Email Client</button>
            </a>
            <button className="btn" style={{background:"#F7F8FC",color:"#6B7494",padding:"10px 13px"}} onClick={()=>navigator.clipboard?.writeText(link).then(()=>alert("Link copied!"))}>📋</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  MANAGER APPROVAL PAGE  (URL: ?docId=X&level=1or2)
// ─────────────────────────────────────────────────────────────
function ManagerPage({docId,level}){
  const [req,setReq]=useState(null);
  const [note,setNote]=useState("");
  const [done,setDone]=useState(null);
  const [saving,setSav]=useState(false);
  const [err,setErr]=useState(null);

  useEffect(()=>{
    db.collection("procurements").doc(docId).get()
      .then(d=>d.exists?setReq({id:d.id,...d.data()}):setErr("Request not found."))
      .catch(e=>setErr(e.message));
  },[]);

  const expected=level===1?"mgr1-pending":"mgr2-pending";
  const mgrName =req?(level===1?req.mgr1Name:req.mgr2Name):"";
  const mgrEmail=req?(level===1?req.mgr1Email:req.mgr2Email):"";

  const decide=async(approved)=>{
    if(!req||req.status!==expected){setErr("Already actioned or wrong stage.");return;}
    setSav(true);
    const nextStatus=approved?(level===1?"mgr2-pending":"procurement-review"):(level===1?"mgr1-rejected":"mgr2-rejected");
    const {at,date,time}=nowParts();
    const log={
      stage: level===1?"mgr1":"mgr2",
      action: `Manager ${level} ${approved?"Approved":"Rejected"}`,
      by:mgrName, role:"manager", email:mgrEmail, note,
      at, date, time,
    };
    try{
      await db.collection("procurements").doc(docId).update({
        status:nextStatus,
        auditLog:firebase.firestore.FieldValue.arrayUnion(log),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      setDone(approved?"approved":"rejected");
    }catch(e){setErr(e.message);}
    setSav(false);
  };

  const pg={minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0F2F8",padding:20};
  if(!req&&!err) return <div style={pg}><style>{G}</style><div style={{color:"#7B84A0",textAlign:"center"}}>⏳ Loading…</div></div>;
  if(err)        return <div style={pg}><style>{G}</style><div style={{color:"#DC2626",textAlign:"center",maxWidth:360}}><div style={{fontSize:32,marginBottom:8}}>⚠️</div>{err}</div></div>;
  if(done) return(
    <div style={pg}><style>{G}</style>
      <div style={{maxWidth:420,width:"100%",background:"#fff",borderRadius:16,padding:36,boxShadow:"0 4px 24px rgba(0,0,0,.08)",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:12}}>{done==="approved"?"✅":"❌"}</div>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{done==="approved"?"Approved!":"Rejected"}</h2>
        <p style={{color:"#7B84A0",fontSize:13,lineHeight:1.7}}>{done==="approved"?(level===1?"Forwarded to Manager 2 for review.":"Sent to the Procurement team."):"The requester has been notified."}</p>
        <div style={{marginTop:16,padding:"8px 14px",background:"#F7F8FC",borderRadius:7,fontSize:12,color:"#A8B0C8"}}>You may close this tab.</div>
      </div>
    </div>
  );
  if(req.status!==expected) return(
    <div style={pg}><style>{G}</style>
      <div style={{maxWidth:380,width:"100%",background:"#fff",borderRadius:16,padding:36,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:40,marginBottom:10}}>🔒</div>
        <h2 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Already Actioned</h2>
        <p style={{color:"#7B84A0",fontSize:13}}>Current status: <strong>{STATUS[req.status]?.label||req.status}</strong></p>
      </div>
    </div>
  );

  return(
    <div style={pg}><style>{G}</style>
      <div style={{maxWidth:520,width:"100%",background:"#fff",borderRadius:16,boxShadow:"0 4px 24px rgba(0,0,0,.08)",overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",padding:"22px 26px",color:"#fff"}}>
          <div style={{fontSize:12,opacity:.8,marginBottom:3}}>Manager {level} Approval Required · ProcureIQ</div>
          <h1 style={{fontSize:19,fontWeight:700}}>{req.toolName}</h1>

        </div>
        <div style={{padding:24}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
            {[["Vendor",req.toolVendor||"—"],["Department",req.department],["Cost",`${fmtMoney(req.costAmount)} / ${req.costPeriod}`],["Yearly",fmtMoney(toYearly(req.costAmount,req.costPeriod))],["Submitted By",req.submitterName||"—"],["Seats",req.seats||"—"]].map(([k,v])=>(
              <div key={k} style={{background:"#F7F8FC",padding:"9px 12px",borderRadius:8}}><div style={{fontSize:9,color:"#A8B0C8",textTransform:"uppercase",letterSpacing:".06em",marginBottom:2}}>{k}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>
            ))}
          </div>
          {req.justification&&<div style={{background:"#F7F8FC",padding:"10px 13px",borderRadius:8,marginBottom:13,fontSize:13,color:"#4B5268",lineHeight:1.7}}><span style={{fontSize:9,color:"#A8B0C8",textTransform:"uppercase",display:"block",marginBottom:3}}>Justification</span>{req.justification}</div>}
          <div style={{marginBottom:13}}><label className="lbl">Note (optional)</label><textarea className="inp" rows={2} placeholder="Reason for approval or rejection…" value={note} onChange={e=>setNote(e.target.value)} style={{resize:"none"}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <button className="btn" style={{background:"#059669",color:"#fff",padding:"12px",justifyContent:"center",fontSize:14}} onClick={()=>decide(true)} disabled={saving}>{saving?<span className="spin"/>:"✓ Approve"}</button>
            <button className="btn" style={{background:"#DC2626",color:"#fff",padding:"12px",justifyContent:"center",fontSize:14}} onClick={()=>decide(false)} disabled={saving}>{saving?<span className="spin"/>:"✕ Reject"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [role,setRole]=useState("employee");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");

  const go=()=>{

    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#EEF2FF,#F0F2F8)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

          <div style={{marginBottom:16}}><label className="lbl">Your Email</label><input className="inp" type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>

  );
}

  const filtered=useMemo(()=>subs.filter(s=>
    !search||[s.toolName,s.submitterName,s.department].some(v=>v?.toLowerCase().includes(search.toLowerCase()))

              <div style={{display:"flex",gap:12,alignItems:"center"}}>

                    {s.department}
                    <span style={{margin:"0 5px"}}>·</span>
                    Submitted by <strong style={{color:"#6B7494"}}>{s.submitterName}</strong>
                    <span style={{margin:"0 5px"}}>·</span>
                    {fmtDate(s.submittedAt)} {fmtTime(s.submittedAt)}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                <span className="badge" style={{background:sc.bg,color:sc.c}}>{sc.label}</span>
                <span style={{fontSize:11,color:"#A8B0C8",background:"#F7F8FC",padding:"2px 8px",borderRadius:5,border:"1px solid #E2E6F0"}}>{logs.length} actions</span>
                <button className="btn" style={{background:"#EEF2FF",color:"#6366F1",padding:"4px 10px",fontSize:11}} onClick={e=>{e.stopPropagation();onOpenDetail(s.id);}}>Open →</button>
                <span style={{color:"#A8B0C8",fontSize:14,display:"inline-block",transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none"}}>▾</span>

}

// ─────────────────────────────────────────────────────────────
//  MAIN APP
// ─────────────────────────────────────────────────────────────
function App({user,onLogout}){
  const [view,setView]            = useState("dashboard");
  const [subs,setSubs]            = useState([]);
  const [loading,setLoading]      = useState(true);
  const [form,setForm]            = useState(BLANK);
  const [editId,setEditId]        = useState(null);
  const [detailId,setDetailId]    = useState(null);
  const [filterSt,setFilterSt]    = useState("all");
  const [filterDept,setFilterDept]= useState("all");
  const [filterBill,setFilterBill]= useState("all");
  const [search,setSearch]        = useState("");
  const [toast,setToast]          = useState(null);
  const [saving,setSaving]        = useState(false);
  const [emailMod,setEmailMod]    = useState(null);
  const [delConfirm,setDelConf]   = useState(null);
  const [procMsg,setProcMsg]      = useState("");
  const [procPerson,setProcPerson]= useState("");
  const [procNote,setProcNote]    = useState("");
  const [procDecNote,setProcDecNote]=useState("");
  const [detailTab,setDetailTab]  = useState("overview");
  const tRef=useRef(null);

  useEffect(()=>{
    const unsub=db.collection("procurements").orderBy("submittedAt","desc")
      .onSnapshot(snap=>{setSubs(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},
        err=>{showToast("Firebase: "+err.message,"err");setLoading(false);});
    return()=>unsub();
  },[]);

  const toast2=(msg,type="ok")=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),4000);};
  const showToast=toast2;

  const log=(stage,action,note="")=>mkLog(stage,action,user,note);

  // ── SUBMIT / EDIT ────────────────────────────────────────────
  const submitForm=async()=>{
    if(!form.toolName||!form.costAmount){showToast("Tool name and cost are required.","err");return;}
    if(!form.mgr1Name||!form.mgr1Email){showToast("Manager 1 details required.","err");return;}
    if(!form.mgr2Name||!form.mgr2Email){showToast("Manager 2 details required.","err");return;}
    setSaving(true);
    try{
      if(editId){
        const orig=subs.find(s=>s.id===editId);
        const editable=["mgr1-pending","mgr1-rejected","mgr2-rejected","rejected"].includes(orig?.status);
        if(!editable){showToast("Cannot edit at this stage.","err");setSaving(false);return;}
        const isResub=orig.status?.includes("rejected");
        const entry=log(isResub?"submission":"edit", isResub?"Resubmitted After Rejection":"Request Edited", isResub?"Edited and resubmitted for approval":"Details updated");
        await db.collection("procurements").doc(editId).update({
          ...form, status:"mgr1-pending",
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
          auditLog:firebase.firestore.FieldValue.arrayUnion(entry),
        });
        const upd={id:editId,...form,submitterName:user.name};
        setEditId(null);setForm(BLANK);setView("dashboard");
        showToast(isResub?"Resubmitted for approval!":"Request updated!");
        if(isResub) setTimeout(()=>setEmailMod({req:upd,level:1}),600);
      } else {
        const entry=log("submission","Request Submitted","New procurement request created");
        const ref=await db.collection("procurements").add({
          ...form, status:"mgr1-pending",
          submitterName:user.name, submitterEmail:user.email,
          submittedAt:firebase.firestore.FieldValue.serverTimestamp(),
          auditLog:[entry],
          procurementStatus:"", procurementPerson:"", procurementNote:"",
        });
        const newDoc={id:ref.id,...form,submitterName:user.name};
        setForm(BLANK);setView("dashboard");
        showToast("Submitted! Send approval email to Manager 1.");
        setTimeout(()=>setEmailMod({req:newDoc,level:1}),600);
      }
    }catch(e){showToast(e.message,"err");}
    setSaving(false);
  };

  const startEdit=s=>{
    const ok=["mgr1-pending","mgr1-rejected","mgr2-rejected","rejected"].includes(s.status);
    if(!ok){showToast("Cannot edit at this stage.","err");return;}
    setForm({toolName:s.toolName||"",toolVendor:s.toolVendor||"",toolCategory:s.toolCategory||"Productivity",department:s.department||"Engineering",costAmount:s.costAmount||"",costPeriod:s.costPeriod||"monthly",seats:s.seats||"",urgency:s.urgency||"normal",justification:s.justification||"",mgr1Name:s.mgr1Name||"",mgr1Email:s.mgr1Email||"",mgr2Name:s.mgr2Name||"",mgr2Email:s.mgr2Email||"",alts:s.alts||[{name:"",vendor:"",cost:"",reason:""}]});
    setEditId(s.id);setDetailId(null);setView("submit");
  };

  // ── PROCUREMENT DECIDE ────────────────────────────────────────
  const procDecide=async(id,approved,note="")=>{
    try{
      const entry=log("procurement", approved?"Procurement Approved":"Procurement Rejected", note);
      await db.collection("procurements").doc(id).update({
        status:approved?"approved":"rejected",
        auditLog:firebase.firestore.FieldValue.arrayUnion(entry),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      setProcDecNote("");showToast(approved?"✓ Approved!":"Rejected.");
    }catch(e){showToast(e.message,"err");}
  };

  // ── SET PROCUREMENT STATUS ────────────────────────────────────
  const saveProcStatus=async(id)=>{
    if(!procMsg){showToast("Please select a status.","err");return;}
    if(!procPerson.trim()){showToast("Responsible person name required.","err");return;}
    const note=`Status: ${procMsg} · Responsible: ${procPerson}${procNote?" · Note: "+procNote:""}`;
    const entry=log("procurement","Procurement Status Updated",note);
    try{
      await db.collection("procurements").doc(id).update({
        procurementStatus:procMsg, procurementPerson:procPerson, procurementNote:procNote,
        auditLog:firebase.firestore.FieldValue.arrayUnion(entry),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      showToast("Status saved!");setProcMsg("");setProcPerson("");setProcNote("");
    }catch(e){showToast(e.message,"err");}
  };

  // ── DELETE ────────────────────────────────────────────────────
  const deleteReq=async(id)=>{
    try{
      await db.collection("procurements").doc(id).delete();
      setDelConf(null);setDetailId(null);showToast("Deleted.");
    }catch(e){showToast(e.message,"err");}
  };

  const detail=subs.find(s=>s.id===detailId);
  const canDel=user.role==="admin"||user.role==="procurement";
  const canProc=user.role==="procurement"||user.role==="admin";
  const canEditReq=user.role==="employee"||user.role==="admin";

  const filtered=useMemo(()=>subs
    .filter(s=>filterSt==="all"||s.status===filterSt)
    .filter(s=>filterDept==="all"||s.department===filterDept)
    .filter(s=>filterBill==="all"||s.costPeriod===filterBill)
    .filter(s=>!search||[s.toolName,s.submitterName,s.department].some(v=>v?.toLowerCase().includes(search.toLowerCase())))
  ,[subs,filterSt,filterDept,filterBill,search]);

  const stats=useMemo(()=>({
    total:subs.length,
    m1:subs.filter(s=>s.status==="mgr1-pending").length,
    m2:subs.filter(s=>s.status==="mgr2-pending").length,
    proc:subs.filter(s=>s.status==="procurement-review").length,
    approved:subs.filter(s=>s.status==="approved").length,
    rejected:subs.filter(s=>s.status?.includes("rejected")).length,
    yearly:subs.filter(s=>s.status==="approved").reduce((t,s)=>t+toYearly(s.costAmount,s.costPeriod),0),
    byDept:DEPTS.reduce((a,d)=>({...a,[d]:subs.filter(s=>s.department===d&&s.status==="approved").reduce((t,s)=>t+toYearly(s.costAmount,s.costPeriod),0)}),{}),
  }),[subs]);

  const nav=v=>{setView(v);setDetailId(null);setDetailTab("overview");};
  const setF=p=>setForm(f=>({...f,...p}));

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"'Inter','Segoe UI',sans-serif",background:"#F0F2F8"}}>
      <style>{G}</style>

      {/* ─── SIDEBAR ─── */}
      <div style={{width:220,background:"#fff",borderRight:"1px solid #E2E6F0",display:"flex",flexDirection:"column",padding:"14px 8px",flexShrink:0}}>
        <div style={{padding:"0 6px 14px",borderBottom:"1px solid #E2E6F0",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:30,height:30,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>⚙</div>
            <div style={{fontSize:13,fontWeight:700}}>ProcureIQ</div>
          </div>
          <div style={{background:"#F7F8FC",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:11,fontWeight:700,color:ROLES[user.role]?.color}}>{ROLES[user.role]?.icon} {ROLES[user.role]?.label}</div>
            <div style={{fontSize:12,fontWeight:600,marginTop:1}}>{user.name}</div>
            <div style={{fontSize:11,color:"#A8B0C8",marginTop:1}}>{user.email}</div>
          </div>
        </div>
        <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
          {[["dashboard","📊","Dashboard"],["submit","＋","New Request"],["billing","💳","Billing"],["audit","📋","Audit & Timeline"],["compare","⚖","Compare"]].map(([v,ic,lb])=>(
            <div key={v} className={`nav-li${view===v?" on":""}`} onClick={()=>nav(v)}>
              <span style={{fontSize:14,width:18,textAlign:"center"}}>{ic}</span>{lb}
              {v==="dashboard"&&(stats.m1>0||stats.m2>0||stats.proc>0)&&<div style={{marginLeft:"auto",display:"flex",gap:3}}>
                {stats.m1>0&&<span style={{background:"#D97706",color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",fontWeight:700}}>{stats.m1}</span>}
                {stats.m2>0&&<span style={{background:"#7C3AED",color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",fontWeight:700}}>{stats.m2}</span>}
                {stats.proc>0&&<span style={{background:"#0284C7",color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",fontWeight:700}}>{stats.proc}</span>}
              </div>}
            </div>
          ))}
        </nav>
        <div style={{borderTop:"1px solid #E2E6F0",paddingTop:10}}>
          <button className="btn" style={{background:"#FEF2F2",color:"#DC2626",padding:"8px",width:"100%",justifyContent:"center",fontSize:12}} onClick={onLogout}>← Switch Role</button>
        </div>
      </div>

      {/* ─── CONTENT ─── */}
      <div style={{flex:1,overflow:"auto",padding:"22px 26px"}}>

        {/* ════ DASHBOARD ════ */}
        {view==="dashboard"&&!detailId&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
              <div><h1 style={{fontSize:21,fontWeight:700}}>Dashboard</h1><p style={{fontSize:12,color:"#7B84A0",marginTop:2}}>Requester → Manager 1 → Manager 2 → Procurement</p></div>
              <button className="btn" style={{background:"#6366F1",color:"#fff",padding:"9px 15px"}} onClick={()=>nav("submit")}>＋ New Request</button>
            </div>

                </select>
                <select className="inp" style={{width:120}} value={filterBill} onChange={e=>setFilterBill(e.target.value)}>
                  <option value="all">All Billing</option>
                  <option value="monthly">Monthly</option>
                  <option value="yearly">Yearly</option>
                </select>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {[["all","All"],["mgr1-pending","Mgr 1"],["mgr2-pending","Mgr 2"],["procurement-review","Proc."],["approved","Approved"],["mgr1-rejected","Rejected"]].map(([s,l])=>(

                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>

                    <tbody>
                      {filtered.map((s,ri)=>{
                        const sc=STATUS[s.status]||{label:"Draft",c:"#94A3B8",bg:"#F1F5F9"};

                            <td style={{padding:"9px 12px",fontSize:12,color:"#6B7494",background:ri%2===0?"#fff":"#FAFBFE"}}>{s.department}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,fontWeight:600,background:ri%2===0?"#fff":"#FAFBFE"}}>{fmtMoney(s.costAmount)}<div style={{fontSize:10,color:"#A8B0C8"}}>{fmtMoney(toYearly(s.costAmount,s.costPeriod))}/yr</div></td>
                            <td style={{padding:"9px 12px",background:ri%2===0?"#fff":"#FAFBFE"}}><span style={{padding:"2px 7px",borderRadius:5,fontSize:10,fontWeight:700,background:s.costPeriod==="monthly"?"#EEF2FF":"#ECFDF5",color:s.costPeriod==="monthly"?"#6366F1":"#059669"}}>{s.costPeriod==="monthly"?"Monthly":"Yearly"}</span></td>

                            <td style={{padding:"9px 12px",fontSize:11,background:ri%2===0?"#fff":"#FAFBFE"}}><div style={{fontWeight:500}}>{s.mgr2Name}</div><div style={{color:"#A8B0C8",fontSize:10}}>{s.mgr2Email}</div></td>

                                {s.status==="mgr2-pending"&&<button className="btn" style={{background:"#F5F3FF",color:"#7C3AED",padding:"4px 8px",fontSize:10}} onClick={()=>setEmailMod({req:s,level:2})}>📧 M2</button>}
                                {canProc&&s.status==="procurement-review"&&<><button className="btn" style={{background:"#ECFDF5",color:"#059669",padding:"4px 7px",fontSize:11}} onClick={()=>procDecide(s.id,true)}>✓</button><button className="btn" style={{background:"#FEF2F2",color:"#DC2626",padding:"4px 7px",fontSize:11}} onClick={()=>procDecide(s.id,false)}>✕</button></>}
                                {canEditReq&&["mgr1-pending","mgr1-rejected","mgr2-rejected","rejected"].includes(s.status)&&<button className="btn" style={{background:"#FFFBEB",color:"#D97706",padding:"4px 7px",fontSize:11}} onClick={()=>startEdit(s)}>✏️</button>}
                                {canDel&&<button className="btn" style={{background:"#FEF2F2",color:"#DC2626",padding:"4px 7px",fontSize:11}} onClick={()=>setDelConf(s.id)}>🗑</button>}

                            </td>
                          </tr>

                  </table>

                      <span className="badge" style={{background:STATUS[detail.status]?.bg,color:STATUS[detail.status]?.c,padding:"4px 11px",fontSize:12}}>{STATUS[detail.status]?.label||"Draft"}</span>

                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:9,marginBottom:12}}>

                        <div key={k} style={{background:"#F7F8FC",padding:"9px 11px",borderRadius:8}}><div style={{fontSize:9,color:"#A8B0C8",textTransform:"uppercase",marginBottom:2}}>{k}</div><div style={{fontSize:12,fontWeight:700}}>{v}</div></div>
                      ))}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>
                      <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",padding:"9px 11px",borderRadius:8}}><div style={{fontSize:9,color:"#D97706",textTransform:"uppercase",fontWeight:700,marginBottom:3}}>Manager 1</div><div style={{fontWeight:700,fontSize:12}}>{detail.mgr1Name}</div><div style={{fontSize:11,color:"#7B84A0"}}>{detail.mgr1Email}</div></div>
                      <div style={{background:"#F5F3FF",border:"1px solid #DDD6FE",padding:"9px 11px",borderRadius:8}}><div style={{fontSize:9,color:"#7C3AED",textTransform:"uppercase",fontWeight:700,marginBottom:3}}>Manager 2</div><div style={{fontWeight:700,fontSize:12}}>{detail.mgr2Name}</div><div style={{fontSize:11,color:"#7B84A0"}}>{detail.mgr2Email}</div></div>
                    </div>
                    {detail.justification&&<div style={{background:"#F7F8FC",padding:"10px 12px",borderRadius:8}}><div style={{fontSize:9,color:"#A8B0C8",textTransform:"uppercase",marginBottom:3}}>Justification</div><p style={{fontSize:13,color:"#4B5268",lineHeight:1.7}}>{detail.justification}</p></div>}
                    {detail.procurementStatus&&<div style={{marginTop:12,padding:"10px 13px",background:"#ECFDF5",border:"1px solid #A7F3D0",borderRadius:8}}>
                      <div style={{fontSize:9,color:"#059669",textTransform:"uppercase",fontWeight:700,marginBottom:3}}>Procurement Status</div>
                      <div style={{fontWeight:700,fontSize:13,color:"#059669"}}>📦 {detail.procurementStatus}</div>
                      {detail.procurementPerson&&<div style={{fontSize:11,color:"#059669",marginTop:1}}>Responsible: {detail.procurementPerson}</div>}
                      {detail.procurementNote&&<div style={{fontSize:11,color:"#6B7494",marginTop:2,fontStyle:"italic"}}>{detail.procurementNote}</div>}
                    </div>}
                    <div style={{fontSize:11,color:"#A8B0C8",marginTop:10}}>Submitted by {detail.submitterName} · {fmtDate(detail.submittedAt)} {fmtTime(detail.submittedAt)}</div>
                  </div>
                  {detail.alts?.filter(a=>a.name).length>0&&(
                    <div className="card" style={{padding:18}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#A8B0C8",textTransform:"uppercase",marginBottom:10}}>Alternatives Considered</div>

                        <div key={i} style={{background:"#F7F8FC",border:"1px solid #E2E6F0",borderRadius:8,padding:11,marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontWeight:600,fontSize:13}}>{a.name}</div>{a.vendor&&<div style={{fontSize:11,color:"#7B84A0"}}>{a.vendor}</div>}</div>{a.cost&&<div style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#D97706"}}>{fmtMoney(a.cost)}</div>}</div>

                    </div>

                    <p style={{fontSize:12,color:"#7B84A0",marginBottom:9}}>Waiting for <strong>{detail.mgr1Name}</strong></p>
                    <button className="btn" style={{background:"#FFFBEB",color:"#D97706",padding:"9px",width:"100%",justifyContent:"center",border:"1.5px solid #FDE68A"}} onClick={()=>setEmailMod({req:detail,level:1})}>📧 Send Approval Email</button>
                  </div>}
                  {detail.status==="mgr2-pending"&&<div className="card" style={{padding:16,marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#7C3AED",textTransform:"uppercase",marginBottom:8}}>⏳ Manager 2 Pending</div>
                    <p style={{fontSize:12,color:"#7B84A0",marginBottom:9}}>Waiting for <strong>{detail.mgr2Name}</strong></p>

                        <button className="btn" style={{background:"#DC2626",color:"#fff",padding:"9px",justifyContent:"center"}} onClick={()=>procDecide(detail.id,false,procDecNote)}>✕ Reject</button>

                      {detail.procurementStatus&&<div style={{marginTop:10,padding:"8px 10px",background:"#ECFDF5",borderRadius:7,fontSize:12,color:"#059669",fontWeight:600}}>Current: {detail.procurementStatus} · {detail.procurementPerson}</div>}
                    </div>
                  )}
                  {canEditReq&&["mgr1-pending","mgr1-rejected","mgr2-rejected","rejected"].includes(detail.status)&&(
                    <div className="card" style={{padding:16,marginBottom:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#A8B0C8",textTransform:"uppercase",marginBottom:8}}>Edit Request</div>
                      <button className="btn" style={{background:"#FFFBEB",color:"#D97706",padding:"9px",width:"100%",justifyContent:"center",border:"1.5px solid #FDE68A"}} onClick={()=>startEdit(detail)}>✏️ {detail.status.includes("rejected")?"Edit & Resubmit":"Edit Request"}</button>
                      <div style={{fontSize:11,color:"#A8B0C8",marginTop:5,textAlign:"center"}}>{detail.status.includes("rejected")?"Editing will restart the approval flow":"Edit before managers review"}</div>

                  {canDel&&<div className="card" style={{padding:16}}>

                    <button className="btn" style={{background:"#FEF2F2",color:"#DC2626",padding:"9px",width:"100%",justifyContent:"center",border:"1.5px solid #FECACA"}} onClick={()=>setDelConf(detail.id)}>🗑 Delete Request</button>
                  </div>}
                </div>
              </div>
            )}

            {/* ── TIMELINE TAB ── */}
            {detailTab==="timeline"&&(
              <div style={{maxWidth:720}}>
                <div className="card" style={{padding:"18px 20px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700}}>{detail.toolName} — Action Timeline</div>
                    <div style={{fontSize:12,color:"#7B84A0",marginTop:2}}>{(detail.auditLog||[]).length} recorded actions · Submitted {fmtDate(detail.submittedAt)}</div>
                  </div>
                  <span className="badge" style={{background:STATUS[detail.status]?.bg,color:STATUS[detail.status]?.c,padding:"5px 12px",fontSize:12}}>{STATUS[detail.status]?.label||"Draft"}</span>

                {/* Stage summary bar */}
                <div className="card" style={{padding:"12px 16px",marginBottom:20,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#7B84A0",marginRight:4}}>FLOW:</span>
                  {["submission","mgr1","mgr2","procurement"].map((stage,i,arr)=>{

                      <div key={stage} style={{display:"flex",alignItems:"center",gap:6}}>

                          <span style={{fontSize:11,fontWeight:700,color:hasLog?cfg.color:"#A8B0C8"}}>{cfg.label}</span>

                        </div>
                        {i<arr.length-1&&<span style={{color:"#C8D0E0",fontSize:14}}>→</span>}
                      </div>
                    );
                  })}
                </div>
                <Timeline logs={detail.auditLog}/>
              </div>
            )}
          </div>

        {/* ════ SUBMIT FORM ════ */}
        {view==="submit"&&(
          <div style={{maxWidth:720}}>
            <div style={{marginBottom:18}}>
              <h1 style={{fontSize:21,fontWeight:700}}>{editId?"✏️ Edit Request":"＋ New Procurement Request"}</h1>
              <p style={{fontSize:12,color:"#7B84A0",marginTop:3}}>{editId?"Update and resubmit — approval flow will restart from Manager 1":"Request flow: You → Manager 1 → Manager 2 → Procurement"}</p>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

                <div><label className="lbl">Department</label><select className="inp" value={form.department} onChange={e=>setF({department:e.target.value})}>{DEPTS.map(d=><option key={d}>{d}</option>)}</select></div>
              </div>
              <div style={{marginBottom:12}}>
                <label className="lbl">Billing Cycle & Cost *</label>
                <div style={{display:"flex",gap:0,marginBottom:9,width:"fit-content",borderRadius:9,overflow:"hidden",border:"1.5px solid #D4D9EA"}}>
                  {["monthly","yearly"].map(p=>(
                    <button key={p} className="btn" style={{padding:"8px 20px",borderRadius:0,background:form.costPeriod===p?"#6366F1":"#fff",color:form.costPeriod===p?"#fff":"#6B7494",border:"none",fontWeight:700,fontSize:12}} onClick={()=>setF({costPeriod:p})}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>
                  ))}
                </div>
                <input className="inp" type="number" placeholder={`Amount in USD (${form.costPeriod})`} value={form.costAmount} onChange={e=>setF({costAmount:e.target.value})} style={{maxWidth:260}}/>
                {form.costAmount&&<div style={{marginTop:5,fontSize:12,color:"#7B84A0",background:"#F7F8FC",padding:"5px 10px",borderRadius:6,display:"inline-block",marginLeft:8}}>
                  {form.costPeriod==="monthly"?`= ${fmtMoney(parseFloat(form.costAmount)*12)}/yr`:`= ${fmtMoney((parseFloat(form.costAmount)/12).toFixed(2))}/mo`}
                </div>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div><label className="lbl">Seats / Licenses</label><input className="inp" type="number" value={form.seats} onChange={e=>setF({seats:e.target.value})} placeholder="e.g. 25"/></div>
                <div><label className="lbl">Urgency</label>
                  <div style={{display:"flex",gap:6}}>
                    {["low","normal","high"].map(u=><button key={u} className="btn" style={{padding:"8px 13px",background:form.urgency===u?(u==="high"?"#FEF2F2":u==="normal"?"#EEF2FF":"#ECFDF5"):"#F7F8FC",color:form.urgency===u?(u==="high"?"#DC2626":u==="normal"?"#6366F1":"#059669"):"#6B7494",border:`1.5px solid ${form.urgency===u?(u==="high"?"#FECACA":u==="normal"?"#C7D2FE":"#A7F3D0"):"#D4D9EA"}`}} onClick={()=>setF({urgency:u})}>{u.charAt(0).toUpperCase()+u.slice(1)}</button>)}
                  </div>
                </div>
              </div>
              <div><label className="lbl">Business Justification</label><textarea className="inp" rows={3} value={form.justification} onChange={e=>setF({justification:e.target.value})} placeholder="Why is this tool needed?" style={{resize:"vertical"}}/></div>
            </div>
            <div className="card" style={{padding:20,marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:700,color:"#A8B0C8",textTransform:"uppercase"}}>Alternatives Considered</div>
                <button className="btn" style={{background:"#F7F8FC",color:"#6B7494",padding:"4px 9px",fontSize:11}} onClick={()=>setF({alts:[...form.alts,{name:"",vendor:"",cost:"",reason:""}]})}>+ Add</button>
              </div>
              {form.alts.map((alt,i)=>(
                <div key={i} style={{background:"#F7F8FC",border:"1px solid #E2E6F0",borderRadius:9,padding:12,marginBottom:9}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px",gap:10,marginBottom:8}}>
                    <div><label className="lbl">Tool</label><input className="inp" value={alt.name} onChange={e=>{const a=[...form.alts];a[i].name=e.target.value;setF({alts:a});}}/></div>
                    <div><label className="lbl">Vendor</label><input className="inp" value={alt.vendor} onChange={e=>{const a=[...form.alts];a[i].vendor=e.target.value;setF({alts:a});}}/></div>
                    <div><label className="lbl">Cost $</label><input className="inp" type="number" value={alt.cost} onChange={e=>{const a=[...form.alts];a[i].cost=e.target.value;setF({alts:a});}}/></div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                    <div style={{flex:1}}><label className="lbl">Reason Not Selected</label><input className="inp" value={alt.reason} placeholder="Why not chosen?" onChange={e=>{const a=[...form.alts];a[i].reason=e.target.value;setF({alts:a});}}/></div>
                    {form.alts.length>1&&<button className="btn" style={{background:"#FEF2F2",color:"#DC2626",padding:"8px 10px"}} onClick={()=>setF({alts:form.alts.filter((_,j)=>j!==i)})}>✕</button>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" style={{background:"#6366F1",color:"#fff",padding:"11px 22px",fontSize:14}} onClick={submitForm} disabled={saving}>{saving&&<span className="spin"/>}{saving?"Saving…":editId?"💾 Save & Resubmit":"Submit Request →"}</button>
              <button className="btn" style={{background:"#F7F8FC",color:"#6B7494",padding:"11px 16px",fontSize:14}} onClick={()=>{setForm(BLANK);setEditId(null);setView("dashboard");}}>Cancel</button>
            </div>
          </div>
        )}

        {/* ════ BILLING ════ */}
        {view==="billing"&&(
          <div>
            <div style={{marginBottom:18}}><h1 style={{fontSize:21,fontWeight:700}}>💳 Billing Tracker</h1><p style={{fontSize:12,color:"#7B84A0",marginTop:2}}>Monthly and yearly subscriptions for approved tools</p></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
              {["monthly","yearly"].map(period=>{
                const items=subs.filter(s=>s.costPeriod===period&&s.status==="approved");
                const total=items.reduce((t,s)=>t+parseFloat(s.costAmount||0),0);
                return(
                  <div key={period} className="card" style={{padding:18}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#A8B0C8",textTransform:"uppercase"}}>{period} Subscriptions</div>
                      <span style={{padding:"2px 8px",borderRadius:5,fontSize:10,fontWeight:700,background:period==="monthly"?"#EEF2FF":"#ECFDF5",color:period==="monthly"?"#6366F1":"#059669"}}>{items.length} tools</span>
                    </div>
                    {items.length===0?<div style={{color:"#A8B0C8",fontSize:12}}>No approved {period} subscriptions.</div>:items.map(s=>(
                      <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #F0F2F8",alignItems:"center"}}>
                        <div><div style={{fontWeight:600,fontSize:13}}>{s.toolName}</div><div style={{fontSize:11,color:"#7B84A0"}}>{s.department}</div></div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontWeight:700,fontFamily:"monospace",color:period==="monthly"?"#6366F1":"#059669"}}>{fmtMoney(s.costAmount)}/{period==="monthly"?"mo":"yr"}</div>
                          <div style={{fontSize:10,color:"#A8B0C8"}}>{period==="monthly"?fmtMoney(parseFloat(s.costAmount)*12)+"/yr":fmtMoney((parseFloat(s.costAmount)/12).toFixed(2))+"/mo"}</div>
                        </div>
                      </div>
                    ))}
                    <div style={{marginTop:10,paddingTop:10,borderTop:"2px solid #E2E6F0",display:"flex",justifyContent:"space-between",fontWeight:700}}>
                      <span style={{fontSize:13}}>Total/{period==="monthly"?"month":"year"}</span>
                      <span style={{fontFamily:"monospace",color:period==="monthly"?"#6366F1":"#059669"}}>{fmtMoney(total)}</span>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="card" style={{padding:18}}>
              <div style={{fontSize:10,fontWeight:700,color:"#A8B0C8",textTransform:"uppercase",marginBottom:14}}>Approved Yearly Spend by Department</div>
              {DEPTS.filter(d=>stats.byDept[d]>0).length===0?<div style={{color:"#A8B0C8",fontSize:12}}>No approved requests yet.</div>:
              DEPTS.filter(d=>stats.byDept[d]>0).sort((a,b)=>stats.byDept[b]-stats.byDept[a]).map(dept=>{
                const val=stats.byDept[dept];
                const max=Math.max(...DEPTS.map(d=>stats.byDept[d]));
                return(
                  <div key={dept} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:500}}>{dept}</span><span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#6366F1"}}>{fmtMoney(val)}/yr</span></div>
                    <div style={{height:5,background:"#F0F2F8",borderRadius:3}}><div style={{height:5,background:"linear-gradient(90deg,#6366F1,#8B5CF6)",borderRadius:3,width:`${max>0?(val/max)*100:0}%`,transition:"width .5s"}}/></div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ════ AUDIT / TIMELINE ════ */}
        {view==="audit"&&<AuditPage subs={subs} onOpenDetail={id=>{setDetailId(id);setDetailTab("timeline");setView("dashboard");}}/>}

        {/* ════ COMPARE ════ */}
        {view==="compare"&&<CompareView subs={subs}/>}

      </div>{/* end content */}

      {emailMod&&<EmailModal req={emailMod.req} level={emailMod.level} onClose={()=>setEmailMod(null)}/>}

      {delConfirm&&(
        <div className="overlay" onClick={()=>setDelConf(null)}>
          <div className="card" style={{maxWidth:360,width:"100%",padding:26,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:36,marginBottom:10}}>🗑</div>
            <h3 style={{fontSize:17,fontWeight:700,marginBottom:7}}>Delete this request?</h3>
            <p style={{fontSize:12,color:"#7B84A0",marginBottom:18,lineHeight:1.6}}>All data and timeline logs will be permanently deleted. This cannot be undone.</p>
            <div style={{display:"flex",gap:9,justifyContent:"center"}}>
              <button className="btn" style={{background:"#DC2626",color:"#fff",padding:"10px 20px"}} onClick={()=>deleteReq(delConfirm)}>Yes, Delete</button>
              <button className="btn" style={{background:"#F7F8FC",color:"#6B7494",padding:"10px 20px"}} onClick={()=>setDelConf(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast" style={{background:toast.type==="err"?"#FEF2F2":"#ECFDF5",color:toast.type==="err"?"#DC2626":"#059669",border:`1px solid ${toast.type==="err"?"#FECACA":"#A7F3D0"}`}}><span>{toast.type==="err"?"⚠":"✓"}</span>{toast.msg}</div>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  ROOT
// ─────────────────────────────────────────────────────────────
function Root(){
  const [user,setUser]=useState(null);
  const p=new URLSearchParams(window.location.search);
  const docId=p.get("docId"), level=parseInt(p.get("level")||"1");
  if(docId) return <ManagerPage docId={docId} level={level}/>;
  if(!user)  return <Login onLogin={setUser}/>;
  return <App user={user} onLogout={()=>setUser(null)}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
